# 预提交钩子配置 (离线环境 — 仅本地钩子)
# 安装: pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: black
        name: black (formatter)
        entry: .venv/Scripts/python.exe -m black
        language: system
        types: [python]
        args: ['--check', '--diff']
      - id: isort
        name: isort (import sorter)
        entry: .venv/Scripts/python.exe -m isort
        language: system
        types: [python]
        args: ['--check-only', '--diff']
      - id: flake8
        name: flake8 (linter)
        entry: .venv/Scripts/python.exe -m flake8
        language: system
        types: [python]
      - id: sync-mods
        name: mod directory sync check
        entry: .venv/Scripts/python.exe -c "import sys; sys.path.insert(0,'ddesign_tool/src'); from tools.sync_mods import main; sys.exit(main(['--check']))"
        language: system
        pass_filenames: false
        always_run: true

default_language_version:
  python: python3.10

exclude: |
  (?x)^(
    .*\.min\.js|.*\.min\.css|.*\.min\.html|
    ^\.venv/|^venv/|^env/|^dist/|^build/|
    ^\.git/|^\.tox/|^\.mypy_cache/|^\.pytest_cache/|
    ^ddesign_tool.exe_extracted/
  )$
