[design_parameters]
# 曼宁粗糙系数
manning_n = 0.014

# 管道类型：污水/雨水
pipe_type = 污水

# 流速限制 (m/s)
min_velocity = 0.6
max_velocity = 1.0

# 最小设计坡度
default_min_slope = 0.001

# 最小推荐充满度
min_recommended_fullness = 0.1

# 初始覆土深度 (m)
initial_cover = 1.5

# 优化准则：slope（坡度优先）或 diameter（管径优先）
optimization_criterion = slope

# 最大管径 (mm)
D_max = 1500

# 最大并联尝试次数
max_parallel_attempts = 10

# 跌水井设置阈值 (m)
drop_well_threshold = 1.0

# ── 流量推算参数 (Excel 中流量列为空时, 由汇水面积自动推算) ──
# 污水比流量 L/(s·ha) — 典型城镇污水: 0.5~1.2
sewage_specific_flow = 0.85

# 雨水径流系数 — 综合径流系数: 0.4~0.8
runoff_coefficient = 0.6

# 暴雨强度 L/(s·ha) — 重现期1年, 黑龙江地区
rainfall_intensity = 2.5


[paths]
# 数据目录相对路径
data_dir = data

# 输出目录相对路径
output_dir = output

# 日志目录相对路径
logs_dir = logs

# 默认输入文件扩展名
default_input_ext = .xlsx


[logging]
# 日志级别：DEBUG, INFO, WARNING, ERROR
log_level = INFO

# 日志文件最大大小 (MB)
log_max_size = 10

# 日志文件保留数量
log_backup_count = 5